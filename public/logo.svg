<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" role="img" aria-labelledby="title desc">
  <title id="title">FlowyFocus logo</title>
  <desc id="desc">A flowing focus mark beside the FlowyFocus wordmark.</desc>
  <defs>
    <linearGradient id="flow" x1="90" x2="290" y1="64" y2="264" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="0.52" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="ink" x1="360" x2="850" y1="82" y2="238" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#eefcff"/>
      <stop offset="1" stop-color="#c7d2fe"/>
    </linearGradient>
  </defs>
  <rect width="960" height="320" rx="44" fill="#071112"/>
  <g transform="translate(64 56)">
    <rect width="208" height="208" rx="52" fill="#0d1b1e" stroke="#1f3b43" stroke-width="4"/>
    <path d="M57 83c34-31 79-38 121-18" fill="none" stroke="url(#flow)" stroke-width="22" stroke-linecap="round"/>
    <path d="M50 125c44-28 93-28 136 0" fill="none" stroke="url(#flow)" stroke-width="22" stroke-linecap="round" opacity="0.9"/>
    <path d="M60 167c31 19 70 19 102 0" fill="none" stroke="url(#flow)" stroke-width="22" stroke-linecap="round" opacity="0.82"/>
    <circle cx="154" cy="104" r="18" fill="#eefcff"/>
  </g>
  <g fill="url(#ink)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="336" y="152" font-size="72" font-weight="800">FlowyFocus</text>
    <text x="340" y="204" font-size="27" font-weight="500" fill="#8fb7be">notes, tasks, and focus by group</text>
  </g>
</svg>
